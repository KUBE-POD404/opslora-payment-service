name: Docker Build

on:
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}
      failure_stage:
        value: ${{ jobs.build.outputs.failure_stage }}
      report_url:
        value: ${{ jobs.build.outputs.report_url }}

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      failure_stage: ${{ steps.set_outputs.outputs.failure_stage }}
      report_url: ${{ steps.set_outputs.outputs.report_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate tag
        id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Debug Docker target
        run: |
          echo "Docker username: '${{ secrets.DOCKERHUB_USERNAME }}'"
          echo "Target repo: '${{ secrets.TEST_REPO }}'"
          echo "Final tag: '${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }}'"

      - name: Build image locally
        id: docker_build
        continue-on-error: true
        run: |
          docker buildx build \
            --load \
            -t ${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }} \
            .

      - name: Install Trivy
        id: install_trivy
        if: ${{ steps.docker_build.outcome == 'success' }}
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release apt-transport-https
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan image with Trivy 
        id: trivy_scan
        if: ${{ steps.docker_build.outcome == 'success' && steps.install_trivy.outcome == 'success' }}
        continue-on-error: true
        run: |
          trivy image \
            --scanners vuln \
            --vex repo \
            --vuln-type library \
            --format sarif \
            --output trivy-report.sarif \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            ${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }}

      - name: Upload SARIF to GitHub Security
        if: ${{ steps.docker_build.outcome == 'success' && steps.trivy_scan.outcome != 'skipped' && always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      - name: Push image
        if: ${{ steps.docker_build.outcome == 'success' && steps.trivy_scan.outcome == 'success' }}
        run: |
          docker push ${{ secrets.TEST_REPO }}:${{ steps.meta.outputs.tag }}

      - name: Set outputs
        id: set_outputs
        run: |
          if [ "${{ steps.docker_build.outcome }}" = "failure" ]; then
            echo "failure_stage=build" >> "$GITHUB_OUTPUT"
            echo "report_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.install_trivy.outcome }}" = "failure" ]; then
            echo "failure_stage=trivy-install" >> "$GITHUB_OUTPUT"
            echo "report_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.trivy_scan.outcome }}" = "failure" ]; then
            echo "failure_stage=trivy" >> "$GITHUB_OUTPUT"
            echo "report_url=${{ github.server_url }}/${{ github.repository }}/security/code-scanning" >> "$GITHUB_OUTPUT"
          else
            echo "failure_stage=" >> "$GITHUB_OUTPUT"
            echo "report_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail job if build or scan failed
        if: ${{ steps.docker_build.outcome == 'failure' || steps.install_trivy.outcome == 'failure' || steps.trivy_scan.outcome == 'failure' }}
        run: exit 1