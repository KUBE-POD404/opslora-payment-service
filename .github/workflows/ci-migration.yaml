name: Migration Check

on:
  workflow_call:
    outputs:
      migration_status:
        value: ${{ jobs.migration.outputs.migration_status }}
      failure_stage:
        value: ${{ jobs.migration.outputs.failure_stage }}
      report_url:
        value: ${{ jobs.migration.outputs.report_url }}

jobs:
  migration:
    runs-on: ubuntu-latest
    outputs:
      migration_status: ${{ steps.result.outputs.status }}
      failure_stage: ${{ steps.failure.outputs.stage }}
      report_url: ${{ steps.report.outputs.url }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: opslora_test
          MYSQL_USER: opslora
          MYSQL_PASSWORD: opslora
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uopslora -popslora"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql+pymysql://opslora:opslora@127.0.0.1:3306/opslora_test
      JWT_SECRET_KEY: test-secret-key-that-is-long-enough
      INVOICE_SERVICE_URL: http://invoice-service:3000
      API_VERSION: /api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        id: install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        id: migrate
        run: alembic upgrade head

      - id: report
        if: always()
        run: echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - id: failure
        if: always()
        run: |
          if [ "${{ steps.install.outcome }}" = "failure" ]; then
            echo "stage=dependency_install_failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.migrate.outcome }}" = "failure" ]; then
            echo "stage=alembic_upgrade_failed" >> "$GITHUB_OUTPUT"
          else
            echo "stage=success" >> "$GITHUB_OUTPUT"
          fi

      - id: result
        if: always()
        run: |
          if [ "${{ steps.install.outcome }}" = "failure" ] || [ "${{ steps.migrate.outcome }}" = "failure" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi
